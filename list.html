<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>23880259 - Le Dam Duy Phuc</title>
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100">
    <div class="container mx-auto py-4 relative min-h-screen">
      <h1 class="font-bold text-xl">Danh sách RSS</h1>
      <section class="bg-white p-4 rounded-lg shadow-md my-5">
        <form class="flex items-center gap-4">
          <input
            type="text"
            id="title"
            class="px-1 py-2.5 bg-neutral-secondary-medium border border-default-medium rounded ps-9 text-heading text-sm focus:ring-brand focus:border-brand block w-full placeholder:text-body basis-1/3"
            placeholder="Tên nguồn"
            required
          />
          <input
            type="text"
            id="name"
            class="px-1 py-2.5 bg-neutral-secondary-medium border border-default-medium rounded ps-9 text-heading text-sm focus:ring-brand focus:border-brand block w-full placeholder:text-body"
            placeholder="Link RSS"
            required
          />

          <button
            type="submit"
            class="inline-flex items-center justify-center shrink-0 text-white bg-blue-700 rounded-lg p-4 hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs rounded-base h-10 focus:outline-none"
          >
            Thêm
          </button>
        </form>
      </section>

      <section
        id="list"
        class="bg-white p-4 rounded-lg shadow-md my-5"
      ></section>

      <div
        id="popup-modal"
        tabindex="-1"
        class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full"
      >
        <div class="relative p-4 w-full max-w-md max-h-full">
          <div
            class="relative bg-white border border-default rounded-base shadow-sm p-4 md:p-6"
          >
            <button
              type="button"
              class="absolute top-3 end-2.5 text-body bg-transparent hover:bg-neutral-tertiary hover:text-heading rounded-base text-sm w-9 h-9 ms-auto inline-flex justify-center items-center"
              data-modal-hide="popup-modal"
            >
              <svg
                class="w-5 h-5"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18 17.94 6M18 18 6.06 6"
                />
              </svg>
              <span class="sr-only">Close modal</span>
            </button>
            <div class="p-4 md:p-5 text-center">
              <svg
                class="mx-auto mb-4 text-fg-disabled w-12 h-12"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 13V8m0 8h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                />
              </svg>
              <h3 class="mb-6 text-body">
                Are you sure you want to delete this link?
              </h3>
              <div class="flex items-center space-x-4 justify-center">
                <button
                  data-modal-hide="popup-modal"
                  type="button"
                  class="text-white bg-red-600 box-border border border-transparent hover:bg-danger-strong focus:ring-4 focus:ring-danger-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
                >
                  Yes, I'm sure
                </button>
                <button
                  data-modal-hide="popup-modal"
                  type="button"
                  class="text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none"
                >
                  No, cancel
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Footer -->
      <footer
        class="text-center bg-white text-xs p-4 rounded-lg shadow-md absolute bottom-4 w-full"
      >
        <p>
          <span class="font-bold">Thông tin sinh viên: </span>23880259 - Le Dam
          Duy Phuc - 23880259@student.hcmus.edu.vn
        </p>
        <p><span class="font-bold">Project Link: </span></p>
        <p><span class="font-bold">Mô tả Project: </span></p>
      </footer>
    </div>

    <script type="module" async>
      const list = document.getElementById("list");
      const localstorage = window.localStorage.getItem("data");
      let data = [];
      if (!localstorage) {
        const rawData = await fetch("./data.json").then((res) => res.json());
        data = rawData.slice(1, 6);
        window.localStorage.setItem(
          "data",
          JSON.stringify(rawData.slice(1, 6)),
        );
      } else {
        data = JSON.parse(localstorage);
      }

      list.innerHTML = data
        .map(
          (item, index) => `<div class="flex content-between w-full">
        <div class="w-full" onclick="window.open('list.html')">
          <p class="font-bold text-blue-700">${item.title}</p>
          <p class="">${item.link}</p>
        </div>

<button data-modal-target="popup-modal" data-modal-toggle="popup-modal" 
          class="bg-red-700 text-white p-2 cursor-pointer rounded-lg hover:bg-red-500 focus:ring-4 focus:ring-red-300 shadow-xs rounded-base h-10 focus:outline-none"
type="button" onlick="">
Xoa
</button>


         </div>
${index !== data.length - 1 && `<div class="w-full border border-gray-400 my-4"></div>`}
      `,
        )
        .join("");
    </script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
  </body>
</html>
